name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install openai-whisper

      - name: Download BBDown
        shell: pwsh
        run: |
          # 获取 BBDown 最新版本
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/nilaoda/BBDown/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" -and $_.name -like "*.zip" } | Select-Object -First 1
          
          if ($null -eq $asset) {
            # 如果没有 zip，尝试找单独的 exe
            $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" } | Select-Object -First 1
          }
          
          Write-Host "Downloading BBDown: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bbdown_download.zip"
          
          # 尝试解压，如果失败则说明它本身就是个 exe
          try {
            Expand-Archive -Path "bbdown_download.zip" -DestinationPath "bbdown_temp" -Force
            $bbdownExe = Get-ChildItem -Path "bbdown_temp" -Filter "BBDown.exe" -Recurse | Select-Object -First 1
            if ($bbdownExe) {
              Copy-Item $bbdownExe.FullName -Destination "BBDown.exe" -Force
            }
          } catch {
            Rename-Item "bbdown_download.zip" "BBDown.exe" -Force
          }
          
          Write-Host "BBDown.exe ready: $(Test-Path BBDown.exe)"

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name "B站视频转文本" `
            --windowed `
            --noconfirm `
            --clean `
            --add-data "BBDown.exe;." `
            --hidden-import "whisper" `
            --hidden-import "torch" `
            --hidden-import "tqdm" `
            --hidden-import "tiktoken" `
            --hidden-import "tiktoken_ext" `
            --hidden-import "tiktoken_ext.openai_public" `
            --hidden-import "numba" `
            --collect-data "whisper" `
            main.py

      - name: Create release archive
        shell: pwsh
        run: |
          # 创建发布压缩包
          Compress-Archive -Path "dist\B站视频转文本\*" -DestinationPath "bvideo2text-windows.zip"
          
          # 同时创建一个不含 Whisper 的精简版
          # 精简版：只打包核心脚本 + BBDown
          $liteDir = "bvideo2text-lite"
          New-Item -ItemType Directory -Path $liteDir -Force
          Copy-Item "main.py" $liteDir
          Copy-Item "requirements.txt" $liteDir
          Copy-Item "install.bat" $liteDir
          Copy-Item "BBDown.exe" $liteDir
          Copy-Item "README.md" $liteDir
          Copy-Item -Recurse "core" "$liteDir\core"
          
          # 创建一个启动脚本
          @"
          @echo off
          echo 正在启动 B站视频转文本...
          python main.py
          if errorlevel 1 (
              echo.
              echo [错误] 启动失败！请确保已安装 Python 并运行 install.bat
              pause
          )
          "@ | Out-File -FilePath "$liteDir\启动.bat" -Encoding ascii
          
          Compress-Archive -Path "$liteDir\*" -DestinationPath "bvideo2text-lite.zip"

      - name: Get release info
        id: release_info
        shell: bash
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "B站视频转文本 ${{ steps.release_info.outputs.tag }}"
          body: |
            ## 📺 B站视频转文本 ${{ steps.release_info.outputs.tag }}
            
            发布日期: ${{ steps.release_info.outputs.date }}
            
            ### 📦 下载说明
            
            | 文件 | 说明 | 适用场景 |
            |------|------|---------|
            | `bvideo2text-windows.zip` | **完整版** - 包含 Whisper AI 转写 | 开箱即用，文件较大 |
            | `bvideo2text-lite.zip` | **精简版** - 仅字幕提取 | 文件小，需要 Python 环境 |
            
            ### 🚀 快速开始
            
            **完整版**：解压 → 运行 `B站视频转文本.exe`
            
            **精简版**：解压 → 双击 `install.bat` 安装依赖 → 双击 `启动.bat`

            ### ⚠️ 注意事项
            - 完整版已包含所有依赖，解压即用
            - 首次运行 Whisper 转写时会自动下载模型文件（约 150MB）
            - 有 NVIDIA 显卡会自动使用 GPU 加速
          files: |
            bvideo2text-windows.zip
            bvideo2text-lite.zip
          draft: false
          prerelease: false
