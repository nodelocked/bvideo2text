name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 仅在推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  build-with-model:
    name: "Build ${{ matrix.variant }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 每个 Whisper 模型单独打包一个 exe（内含模型文件）
          - variant: tiny
            model: tiny
            download_model: true
          - variant: base
            model: base
            download_model: true
          - variant: small
            model: small
            download_model: true
          - variant: medium
            model: medium
            download_model: true
          - variant: large
            model: large
            download_model: true
          - variant: turbo
            model: turbo
            download_model: true
          # 精简版：包含 Whisper 库但不带模型（首次使用时自动下载）
          - variant: all-models
            model: ""
            download_model: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install faster-whisper
          pip install opencc-python-reimplemented

      - name: Download BBDown
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/nilaoda/BBDown/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" -and $_.name -like "*.zip" } | Select-Object -First 1
          
          if ($null -eq $asset) {
            $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" } | Select-Object -First 1
          }
          
          Write-Host "Downloading BBDown: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bbdown_download.zip"
          
          try {
            Expand-Archive -Path "bbdown_download.zip" -DestinationPath "bbdown_temp" -Force
            $bbdownExe = Get-ChildItem -Path "bbdown_temp" -Filter "BBDown.exe" -Recurse | Select-Object -First 1
            if ($bbdownExe) {
              Copy-Item $bbdownExe.FullName -Destination "BBDown.exe" -Force
            }
          } catch {
            Rename-Item "bbdown_download.zip" "BBDown.exe" -Force
          }
          
          Write-Host "BBDown.exe ready: $(Test-Path BBDown.exe)"

      - name: Download Whisper model
        if: matrix.download_model
        shell: python
        run: |
          import os
          from faster_whisper import WhisperModel
          print(f"Downloading model: ${{ matrix.model }}")
          # 找到模型缓存路径
          cache_dir = os.path.join(os.path.expanduser("~"), ".cache", "whisper", "models--" + "${{ matrix.model }}".replace("/", "--"))
          os.makedirs(cache_dir, exist_ok=True)
          try:
              model = WhisperModel("${{ matrix.model }}", device="cpu", compute_type="int8", download_root=os.path.join(os.path.expanduser("~"), ".cache", "whisper"))
          except Exception as e:
              print(f"Model download error (ignoring): {e}")
          
          print(f"Model cache dir: {os.path.join(os.path.expanduser('~'), '.cache', 'whisper')}")
          for root, dirs, files in os.walk(os.path.join(os.path.expanduser("~"), ".cache", "whisper")):
              for name in files:
                  fpath = os.path.join(root, name)
                  print(f"  {fpath} ({os.path.getsize(fpath) / 1024 / 1024:.1f} MB)")

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $modelArg = @()
          
          # 如果有预下载的模型，把模型文件也打包进去
          $cacheDir = Join-Path $env:USERPROFILE ".cache\whisper"
          if (("${{ matrix.download_model }}" -eq "true") -and (Test-Path $cacheDir)) {
            $modelArg += "--add-data"
            $modelArg += "$cacheDir;whisper_models"
            Write-Host "Including model files from: $cacheDir"
          }
          
          $args = @(
            "--name", "B站视频转文本-${{ matrix.variant }}"
            "--windowed"
            "--noconfirm"
            "--clean"
            "--add-data", "BBDown.exe;."
            "--hidden-import", "faster_whisper"
            "--hidden-import", "ctranslate2"
            "--hidden-import", "torch"
            "--hidden-import", "tqdm"
            "--hidden-import", "tiktoken"
            "--hidden-import", "tiktoken_ext"
            "--hidden-import", "tiktoken_ext.openai_public"
            "--hidden-import", "numba"
            "--hidden-import", "opencc"
            "--collect-data", "faster_whisper"
            "--collect-data", "ctranslate2"
            "--collect-data", "opencc"
          ) + $modelArg + @("main.py")
          
          Write-Host "Running: pyinstaller $($args -join ' ')"
          & pyinstaller @args

      - name: Create release archive
        shell: pwsh
        run: |
          $distDir = "dist\B站视频转文本-${{ matrix.variant }}"
          
          # 如果有模型文件，复制到正确的位置
          $modelsDir = Join-Path $distDir "whisper_models"
          if (Test-Path $modelsDir) {
            # 设置环境变量让程序知道模型位置
            Write-Host "Models included in package at: $modelsDir"
          }
          
          Compress-Archive -Path "$distDir\*" -DestinationPath "bvideo2text-${{ matrix.variant }}.zip"
          
          $zipSize = (Get-Item "bvideo2text-${{ matrix.variant }}.zip").Length / 1MB
          Write-Host "Archive size: $([math]::Round($zipSize, 1)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bvideo2text-${{ matrix.variant }}
          path: bvideo2text-${{ matrix.variant }}.zip

  # -------------------------------------------------------
  # 精简版：不含 Whisper，仅字幕提取
  # -------------------------------------------------------
  build-lite:
    name: Build lite (no Whisper)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download BBDown
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/nilaoda/BBDown/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" -and $_.name -like "*.zip" } | Select-Object -First 1
          if ($null -eq $asset) {
            $asset = $release.assets | Where-Object { $_.name -like "*win-x64*" } | Select-Object -First 1
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bbdown_download.zip"
          try {
            Expand-Archive -Path "bbdown_download.zip" -DestinationPath "bbdown_temp" -Force
            $bbdownExe = Get-ChildItem -Path "bbdown_temp" -Filter "BBDown.exe" -Recurse | Select-Object -First 1
            if ($bbdownExe) { Copy-Item $bbdownExe.FullName -Destination "BBDown.exe" -Force }
          } catch {
            Rename-Item "bbdown_download.zip" "BBDown.exe" -Force
          }

      - name: Create lite archive
        shell: pwsh
        run: |
          $liteDir = "bvideo2text-lite"
          New-Item -ItemType Directory -Path $liteDir -Force
          Copy-Item "main.py" $liteDir
          Copy-Item "requirements.txt" $liteDir
          Copy-Item "install.bat" $liteDir
          Copy-Item "BBDown.exe" $liteDir
          Copy-Item "README.md" $liteDir
          Copy-Item -Recurse "core" "$liteDir\core"
          
          $batContent = "@echo off`r`necho 正在启动 B站视频转文本...`r`npython main.py`r`nif errorlevel 1 (`r`n    echo.`r`n    echo [错误] 启动失败！请确保已安装 Python 并运行 install.bat`r`n    pause`r`n)"
          Set-Content -Path "$liteDir\启动.bat" -Value $batContent -Encoding ascii
          
          Compress-Archive -Path "$liteDir\*" -DestinationPath "bvideo2text-lite.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bvideo2text-lite
          path: bvideo2text-lite.zip

  # -------------------------------------------------------
  # 发布 Release
  # -------------------------------------------------------
  release:
    name: Create Release
    needs: [build-with-model, build-lite]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.zip" | sort

      - name: Get tag name
        id: release_info
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "B站视频转文本 ${{ steps.release_info.outputs.tag }}"
          body: |
            ## 📺 B站视频转文本 ${{ steps.release_info.outputs.tag }}

            发布日期: ${{ steps.release_info.outputs.date }}

            ### 📦 下载说明

            根据你的需求选择合适的版本：

            | 文件 | 说明 | 大小 |
            |------|------|------|
            | `bvideo2text-tiny.zip` | 内置 tiny 模型，速度最快 | ~350 MB |
            | `bvideo2text-base.zip` | 内置 base 模型，**推荐日常使用** | ~400 MB |
            | `bvideo2text-small.zip` | 内置 small 模型，效果更好 | ~800 MB |
            | `bvideo2text-medium.zip` | 内置 medium 模型，高质量 | ~1.8 GB |
            | `bvideo2text-large.zip` | 内置 large 模型，最佳效果 | ~3.5 GB |
            | `bvideo2text-turbo.zip` | 内置 turbo 模型，速度与质量平衡 | ~1.8 GB |
            | `bvideo2text-all-models.zip` | 包含 Whisper 库，首次转写时下载模型 | ~300 MB |
            | `bvideo2text-lite.zip` | **精简版** - 仅字幕提取，需 Python 环境 | ~20 MB |

            ### 🚀 快速开始

            1. 下载你需要的 `.zip` 文件（推荐 `base`）
            2. 解压到任意目录
            3. 运行 `B站视频转文本-xxx.exe`

            ### 💡 如何选择？

            - **只需要提取字幕**（大部分B站视频都有）→ 任何版本都行，精简版最小
            - **需要语音转写** → 选择一个带模型的版本
              - 推荐 `base`（速度快，效果够用）
              - 追求效果选 `medium` 或 `turbo`
            - **有 NVIDIA 显卡** → 自动使用 GPU 加速
            - **无 NVIDIA 显卡** → 自动回退 CPU，建议选 `tiny` 或 `base`
          files: |
            artifacts/**/*.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
